        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],

                }
            }

    <style>
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
            }
        }

        .sidebar-btn.active {
            background-color: white;
            border-color: #facc15;
            box-shadow: 0 20px 25px -5px rgba(250, 204, 21, 0.2), 0 8px 10px -6px rgba(250, 204, 21, 0.1);

        }

        .sidebar-btn.inactive {
            background-color: transparent;
            border-color: transparent;
            color: #64748b;
        }

        .sidebar-btn.inactive:hover {
            background-color: #f1f5f9;
        }

        .sidebar-icon-active {
            background-color: black;
            color: #facc15;
        }

            border: 1px solid #e2e8f0;

        }

            position: fixed;
            inset: 0;
            background: #F8FAFC;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

</head>

            const input = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');

            // كلمة السر الصحيحة
            const validPass = "swapop2026";

            if (input === validPass) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                initApp();
            } else {
                errorMsg.style.opacity = '1';
                setTimeout(() => { errorMsg.style.opacity = '0'; }, 3000);
            }

            if (e.key === 'Enter') checkPassword();

        let activePhase = 0;

        function renderGlobalKPIs() {
            const container = document.getElementById('global-kpis');
            container.innerHTML = globalKpis.map(kpi => `
                <div class="bg-white p-5 rounded-2xl border ${kpi.color} shadow-sm hover:shadow-md transition-shadow group">
                    <div class="flex justify-between items-start mb-3">
                        <div class="p-2 bg-slate-50 rounded-lg group-hover:bg-white transition-colors">
                            <i data-lucide="${kpi.icon}" class="w-5 h-5 ${kpi.textCol}"></i>
                        </div>
                    </div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">${kpi.label}</p>
                    <div class="flex items-baseline gap-1">
                        <span class="text-2xl font-black text-slate-800">${kpi.value}</span>
                        <span class="text-xs font-bold text-slate-500">${kpi.suffix}</span>
                    </div>
                </div>
            `).join('');
        }

                const isActive = activePhase === idx;

                const iconBgClass = isActive ? 'sidebar-icon-active' : 'sidebar-icon-inactive';
                const tagClass = isActive ? 'bg-yellow-100 text-yellow-700' : 'bg-slate-200 text-slate-500';
                const titleClass = isActive ? 'text-slate-900' : 'text-slate-600';
                const arrowIcon = isActive ? `<i data-lucide="arrow-right" class="w-5 h-5 mr-auto text-yellow-500 shrink-0"></i>` : '';

                html += `
                <button onclick="changePhase(${idx})" class="w-full text-right p-5 rounded-2xl flex items-center gap-4 transition-all duration-500 border ${btnClass}">
                    <div class="w-12 h-12 shrink-0 rounded-xl flex items-center justify-center transition-colors ${iconBgClass}">
                        <i data-lucide="${phase.icon}"></i>
                    </div>
                    <div class="overflow-hidden">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-black px-2 py-0.5 rounded-full uppercase ${tagClass}">${phase.tag}</span>
                            <span class="text-xs font-bold opacity-60 truncate">${phase.duration}</span>
                        </div>
                        <h4 class="font-bold leading-tight ${titleClass}">${phase.title}</h4>
                    </div>
                    ${arrowIcon}
                </button>`;
            });
            container.innerHTML = html;
        }

        function renderContent() {
            const phase = phases[activePhase];

            document.getElementById('phase-header').innerHTML = `
                <div class="absolute top-0 right-0 w-64 h-64 bg-yellow-400/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                <div class="relative z-10">
                    <div class="inline-flex items-center gap-2 px-3 py-1 bg-yellow-400/20 text-yellow-400 rounded-full text-xs font-black mb-4 border border-yellow-400/30 uppercase tracking-widest">
                        ${phase.tag}
                    </div>
                    <h2 class="text-3xl md:text-4xl font-black text-white mb-4 leading-tight">
                        ${phase.title}
                    </h2>
                    <div class="flex items-start gap-3 bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                        <i data-lucide="award" class="w-6 h-6 text-yellow-400 shrink-0 mt-0.5"></i>
                        <p class="text-slate-300 leading-relaxed text-sm md:text-base font-medium">
                            ${phase.goal}
                        </p>
                    </div>
                </div>
            `;

            let monthsHtml = '';
            phase.months.forEach(month => {
                let tasksHtml = month.tasks.map(task => `
                    <li class="flex items-start gap-3 text-slate-700 font-medium">
                        <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-500 shrink-0 mt-0.5"></i>
                        <span class="leading-relaxed text-sm">${task}</span>
                    </li>
                `).join('');

                let kpisHtml = (month.kpis || []).length > 0 ? `
                    <div>
                        <h5 class="text-xs font-bold text-slate-400 uppercase mb-3 flex items-center gap-2">
                            <i data-lucide="bar-chart" class="w-4 h-4"></i> مقاييس الأداء
                        </h5>
                        <div class="flex flex-wrap gap-2">${month.kpis.map(k => `
                            <div class="px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg flex items-center gap-2 text-sm">
                                <span class="font-black text-slate-900">${k.val}</span>
                                <span class="text-slate-600 font-medium">${k.label}</span>
                            </div>`).join('')}
                        </div>
                    </div>` : '';

                let delivHtml = (month.deliverables || []).length > 0 ? `
                    <div>
                        <h5 class="text-xs font-bold text-slate-400 uppercase mb-3 flex items-center gap-2">
                            <i data-lucide="file-text" class="w-4 h-4"></i> المخرجات
                        </h5>
                        <div class="flex flex-wrap gap-2">${month.deliverables.map(d => `
                            <div class="px-3 py-1.5 bg-yellow-50 text-yellow-800 border border-yellow-200 rounded-lg flex items-center gap-2 text-sm font-bold shadow-sm">
                                ${d}
                            </div>`).join('')}
                        </div>
                    </div>` : '';

                monthsHtml += `
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden group hover:border-yellow-300 transition-colors duration-300">
                    <div class="bg-slate-100/50 border-b border-slate-100 p-5 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <span class="inline-block px-3 py-1 bg-white border border-slate-200 text-slate-600 rounded-lg text-xs font-bold mb-2 shadow-sm">
                                ${month.tag}
                            </span>
                            <h4 class="text-xl font-black text-slate-800">${month.title}</h4>
                        </div>
                    </div>
                    <div class="p-6">
                        <ul class="space-y-4 mb-6">${tasksHtml}</ul>
                        <div class="pt-5 border-t border-slate-100 grid md:grid-cols-2 gap-6">
                            ${kpisHtml}
                            ${delivHtml}
                        </div>
                    </div>
                </div>`;
            });

            document.getElementById('months-container').innerHTML = monthsHtml;

            const prevDisabled = activePhase === 0;
            const nextDisabled = activePhase === phases.length - 1;

            document.getElementById('footer-nav').innerHTML = `
                <button onclick="changePhase(${Math.max(0, activePhase - 1)})" ${prevDisabled ? 'disabled' : ''} 
                    class="flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-black transition-all ${prevDisabled ? 'text-slate-300 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-50 hover:shadow-sm border border-transparent hover:border-slate-200'}">
                    <i data-lucide="chevron-right" class="w-5 h-5"></i> المرحلة السابقة
                </button>
                <div class="flex gap-1.5">${phases.map((_, i) => `<div class="h-2 rounded-full transition-all duration-500 ${i === activePhase ? 'w-8 bg-yellow-400' : 'w-2 bg-slate-200'}"></div>`).join('')}</div>
                <button onclick="changePhase(${Math.min(phases.length - 1, activePhase + 1)})" ${nextDisabled ? 'disabled' : ''} 
                    class="flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-black transition-all ${nextDisabled ? 'text-slate-300 cursor-not-allowed' : 'bg-black text-white hover:scale-105 active:scale-95 shadow-xl shadow-slate-200'}">
                    المرحلة التالية <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </button>
            `;

            lucide.createIcons();
        }

        window.changePhase = function (idx) {
            if (idx >= 0 && idx < phases.length) {
                activePhase = idx;
                renderSidebar();
                renderContent();
            }
        };

        function initApp() {
            renderGlobalKPIs();
            renderSidebar();
            renderContent();
        }
    </script>
</body>

</html>
