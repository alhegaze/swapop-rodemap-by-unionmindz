<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swapop 9-Month Marketing Roadmap</title>
    
    <!-- أيقونة الموقع (Favicon) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23facc15'/><text y='50%' x='50%' dotted-anchor='middle' text-anchor='middle' dy='.35em' font-family='sans-serif' font-weight='900' font-size='60' fill='black'>S</text></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
            }
        }

        .sidebar-btn.active {
            background-color: white;
            border-color: #facc15;
            box-shadow: 0 20px 25px -5px rgba(250, 204, 21, 0.2), 0 8px 10px -6px rgba(250, 204, 21, 0.1);
            transform: translateX(-8px);
        }

        .sidebar-btn.inactive {
            background-color: transparent;
            border-color: transparent;
            color: #64748b;
        }

        .sidebar-btn.inactive:hover {
            background-color: #f1f5f9;
        }

        .sidebar-icon-active {
            background-color: black;
            color: #facc15;
        }

        .sidebar-icon-inactive {
            background-color: white;
            border: 1px solid #e2e8f0;
            color: #94a3b8;
        }

        #app-container { display: none; }
        
        #lock-screen {
            position: fixed;
            inset: 0;
            background: #F8FAFC;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
    </style>
</head>

<body class="min-h-screen bg-[#F8FAFC] text-slate-900 font-sans selection:bg-yellow-200 scroll-smooth pb-12">
    
    <!-- صفحة القفل -->
    <div id="lock-screen" class="p-4">
        <div class="max-w-md w-full bg-white rounded-[2rem] p-8 shadow-2xl border border-slate-200 text-center">
            <div class="w-16 h-16 bg-black text-yellow-400 font-black flex items-center justify-center rounded-2xl text-3xl shadow-xl shadow-yellow-200/50 rotate-3 mx-auto mb-6">S</div>
            <h2 class="text-2xl font-black mb-2 italic">Swapop Roadmap</h2>
            <p class="text-slate-500 mb-8 font-medium">يرجى إدخال كلمة السر للوصول إلى الخطة</p>
            
            <div class="relative mb-4 text-right">
                <input type="password" id="password-input" placeholder="كلمة السر" 
                    class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-yellow-400 focus:border-transparent outline-none transition-all text-center font-bold tracking-widest">
            </div>
            
            <button onclick="checkPassword()" 
                class="w-full bg-black text-white font-black py-4 rounded-2xl hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-slate-200">
                دخول
            </button>
            <p id="error-msg" class="text-red-500 mt-4 text-sm font-bold opacity-0 transition-opacity">كلمة السر غير صحيحة!</p>
        </div>
    </div>

    <div class="fixed top-0 left-0 w-full h-1 bg-yellow-400 z-50"></div>

    <div id="app-container" class="max-w-7xl mx-auto px-4 py-8">

        <header class="mb-12 text-center md:text-right">
            <div class="flex flex-col md:flex-row justify-between items-end md:items-center gap-6">
                <div>
                    <div class="flex items-center gap-3 mb-4 justify-center md:justify-start">
                        <div class="w-12 h-12 bg-black text-yellow-400 font-black flex items-center justify-center rounded-2xl text-2xl shadow-xl shadow-yellow-200/50 rotate-3 hover:rotate-0 transition-transform cursor-pointer">S</div>
                        <h1 class="text-4xl font-black tracking-tight text-slate-900 italic">Swapop</h1>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-700">خطة التسويق التنفيذية لـ 9 أشهر</h2>
                    <div class="flex items-center gap-2 mt-2 text-slate-500 font-medium justify-center md:justify-start">
                        <i data-lucide="alert-circle" class="w-4 h-4 text-orange-500"></i>
                        <span>تعديل الأهداف لتركيز عالٍ على أول 10,000 مستخدم</span>
                    </div>
                </div>

                <div class="flex gap-3">
                    <div class="px-4 py-2 bg-white rounded-xl border border-slate-200 shadow-sm text-sm font-bold flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                        حالة الخطة: محدثة
                    </div>
                </div>
            </div>
        </header>

        <div id="global-kpis" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-12"></div>

        <div class="grid lg:grid-cols-12 gap-8 items-start relative">
            <div id="sidebar" class="lg:col-span-4 space-y-3 lg:sticky lg:top-8 h-fit"></div>
            <div class="lg:col-span-8 w-full">
                <div class="bg-white rounded-[2rem] border border-slate-200 shadow-2xl shadow-slate-200/50 overflow-hidden min-h-[600px] flex flex-col transition-all duration-500">
                    <div id="phase-header" class="bg-slate-900 p-8 md:p-10 relative overflow-hidden fade-in"></div>
                    <div class="p-6 md:p-10 flex-grow bg-slate-50">
                        <div id="months-container" class="space-y-8 fade-in"></div>
                    </div>
                    <div id="footer-nav" class="p-6 bg-white border-t border-slate-100 flex flex-wrap justify-between items-center mt-auto gap-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            const validPass = "swapop2026";

            if (input === validPass) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                initApp();
            } else {
                errorMsg.style.opacity = '1';
                setTimeout(() => { errorMsg.style.opacity = '0'; }, 3000);
            }
        }

        document.getElementById('password-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPassword();
        });

        const globalKpis = [
            { label: "المدة الزمنية", value: "9", suffix: " أشهر", icon: "calendar", color: "border-blue-100", textCol: "text-blue-500" },
            { label: "الهدف الجديد", value: "10,000", suffix: " مستخدم", icon: "users", color: "border-yellow-200", textCol: "text-yellow-500" },
            { label: "كثافة العمل", value: "عالية", suffix: "", icon: "zap", color: "border-emerald-100", textCol: "text-emerald-500" },
            { label: "النمو المستهدف", value: "Organic", suffix: " Plus", icon: "trending-up", color: "border-purple-100", textCol: "text-purple-500" }
        ];

        const phases = [
            {
                tag: "Phase 01",
                title: "التأسيس والتموضع الاستراتيجي",
                duration: "أبريل — مايو 2025 (شهران)",
                icon: "search",
                goal: "تركيز مكثف على ريبراندينج سريع وأبحاث سوقية دقيقة لبناء أساس صلب للنمو.",
                months: [
                    {
                        tag: "شهر 1 — أبريل",
                        title: "أبحاث السوق والريبراندينج",
                        tasks: [
                            "تحليل المنافسين وبناء Personas مفصلة للسوق المصري.",
                            "تطوير Brand Identity جديدة تتناسب مع توجهات السوق.",
                            "كتابة Messaging Framework واضح لكل شريحة مستهدفة."
                        ],
                        kpis: [
                            { val: "100%", label: "هوية جاهزة" },
                            { val: "3", label: "شرايح عملاء" }
                        ],
                        deliverables: ["Brand Kit", "Market Insight Report"]
                    },
                    {
                        tag: "شهر 2 — مايو",
                        title: "بناء التواجد الرقمي والمنصات",
                        tasks: [
                            "تحسين الـ Landing Page وتجهيز حسابات التواصل الاجتماعي.",
                            "بناء استراتيجية المحتوى للشهر القادم.",
                            "إعداد أدوات التحليل (GA4, Hotjar) لقياس سلوك المستخدم."
                        ],
                        kpis: [
                            { val: "1", label: "Landing Page" },
                            { val: "3", label: "منصات تواصل" }
                        ],
                        deliverables: ["Content Strategy", "Digital Setup"]
                    }
                ]
            },
            {
                tag: "Phase 02",
                title: "الإطلاق التجريبي والانتشار المحلي",
                duration: "يونيو — أغسطس 2025 (3 أشهر)",
                icon: "zap",
                goal: "بدء التواجد على الأرض واختبار المنتج مع أول 1,000 مستخدم حقيقي.",
                months: [
                    {
                        tag: "شهر 3 — يونيو",
                        title: "الإطلاق المحدود (Soft Launch)",
                        tasks: [
                            "تفعيل نظام الدعوات لخلق ندرة وطلب عالي.",
                            "بدء برنامج السفراء (Ambassadors) في الجامعات المختارة.",
                            "إطلاق أول 100 عملية مقايضة حقيقية بالتنسيق مع الفريق."
                        ],
                        kpis: [
                            { val: "500", label: "مستخدم أولي" },
                            { val: "5", label: "سفراء نشطين" }
                        ],
                        deliverables: ["User Feedback Log"]
                    },
                    {
                        tag: "شهر 4–5 — يوليو/أغسطس",
                        title: "توسيع القاعدة الجماهيرية",
                        tasks: [
                            "تفعيل Viral Loops داخل التطبيق (ادعُ أصدقاءك).",
                            "إطلاق تحديات Swapop على TikTok و Instagram Reels.",
                            "بدء التعاون مع Micro-influencers في مجالات محددة (Tech, Fashion)."
                        ],
                        kpis: [
                            { val: "2,500", label: "مستخدم نشط" },
                            { val: "20", label: "مؤثر شريك" }
                        ],
                        deliverables: ["Influence Campaign Report"]
                    }
                ]
            },
            {
                tag: "Phase 03",
                title: "النمو المتسارع والإطلاق الكامل",
                duration: "سبتمبر — ديسمبر 2025 (4 أشهر)",
                icon: "target",
                goal: "الوصول للهدف النهائي 10,000 مستخدم وترسيخ العلامة التجارية كأكبر منصة مقايضة.",
                months: [
                    {
                        tag: "شهر 6–7 — سبتمبر/أكتوبر",
                        title: "بناء المجتمع (Community Scaling)",
                        tasks: [
                            "إطلاق Swap Days في محافظات مختلفة لزيادة الثقة.",
                            "تحويل المستخدمين الأكثر نشاطاً إلى قادة مجتمعات داخلية.",
                            "تحسين تجربة المستخدم بناءً على بيانات الـ Soft Launch."
                        ],
                        kpis: [
                            { val: "6,000", label: "مستخدم" },
                            { val: "10", label: "فعاليات Swap" }
                        ],
                        deliverables: ["Community Playbook"]
                    },
                    {
                        tag: "شهر 8–9 — نوفمبر/ديسمبر",
                        title: "الإطلاق الرسمي والوصول لـ 10K",
                        tasks: [
                            "حملة PR واسعة في المواقع التقنية والشبابية.",
                            "إطلاق ميزات Pro للمستخدمين الأوائل مجاناً لفترة محدودة.",
                            "تحليل النتائج النهائية وتجهيز خطة التوسع لعام 2026."
                        ],
                        kpis: [
                            { val: "10,000", label: "مستخدم مسجل" },
                            { val: "1", label: "Full Launch" }
                        ],
                        deliverables: ["Investor Deck", "2026 Expansion Plan"]
                    }
                ]
            }
        ];

        let activePhase = 0;

        function renderGlobalKPIs() {
            const container = document.getElementById('global-kpis');
            container.innerHTML = globalKpis.map(kpi => `
                <div class="bg-white p-5 rounded-2xl border ${kpi.color} shadow-sm hover:shadow-md transition-shadow group">
                    <div class="flex justify-between items-start mb-3">
                        <div class="p-2 bg-slate-50 rounded-lg group-hover:bg-white transition-colors">
                            <i data-lucide="${kpi.icon}" class="w-5 h-5 ${kpi.textCol}"></i>
                        </div>
                    </div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">${kpi.label}</p>
                    <div class="flex items-baseline gap-1">
                        <span class="text-2xl font-black text-slate-800">${kpi.value}</span>
                        <span class="text-xs font-bold text-slate-500">${kpi.suffix}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar');
            let html = `<h3 class="text-sm font-black text-slate-400 uppercase tracking-widest px-2 mb-4">المراحل الثلاث</h3>`;

            phases.forEach((phase, idx) => {
                const isActive = activePhase === idx;
                const btnClass = isActive ? 'sidebar-btn active' : 'sidebar-btn inactive';
                const iconBgClass = isActive ? 'sidebar-icon-active' : 'sidebar-icon-inactive';
                const tagClass = isActive ? 'bg-yellow-100 text-yellow-700' : 'bg-slate-200 text-slate-500';
                const titleClass = isActive ? 'text-slate-900' : 'text-slate-600';
                const arrowIcon = isActive ? `<i data-lucide="arrow-right" class="w-5 h-5 mr-auto text-yellow-500 shrink-0"></i>` : '';

                html += `
                <button onclick="changePhase(${idx})" class="w-full text-right p-5 rounded-2xl flex items-center gap-4 transition-all duration-500 border ${btnClass}">
                    <div class="w-12 h-12 shrink-0 rounded-xl flex items-center justify-center transition-colors ${iconBgClass}">
                        <i data-lucide="${phase.icon}"></i>
                    </div>
                    <div class="overflow-hidden">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-black px-2 py-0.5 rounded-full uppercase ${tagClass}">${phase.tag}</span>
                            <span class="text-xs font-bold opacity-60 truncate">${phase.duration}</span>
                        </div>
                        <h4 class="font-bold leading-tight ${titleClass}">${phase.title}</h4>
                    </div>
                    ${arrowIcon}
                </button>`;
            });
            container.innerHTML = html;
        }

        function renderContent() {
            const phase = phases[activePhase];

            document.getElementById('phase-header').innerHTML = `
                <div class="absolute top-0 right-0 w-64 h-64 bg-yellow-400/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                <div class="relative z-10">
                    <div class="inline-flex items-center gap-2 px-3 py-1 bg-yellow-400/20 text-yellow-400 rounded-full text-xs font-black mb-4 border border-yellow-400/30 uppercase tracking-widest">
                        ${phase.tag}
                    </div>
                    <h2 class="text-3xl md:text-4xl font-black text-white mb-4 leading-tight">
                        ${phase.title}
                    </h2>
                    <div class="flex items-start gap-3 bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                        <i data-lucide="award" class="w-6 h-6 text-yellow-400 shrink-0 mt-0.5"></i>
                        <p class="text-slate-300 leading-relaxed text-sm md:text-base font-medium">
                            ${phase.goal}
                        </p>
                    </div>
                </div>
            `;

            let monthsHtml = '';
            phase.months.forEach(month => {
                let tasksHtml = month.tasks.map(task => `
                    <li class="flex items-start gap-3 text-slate-700 font-medium">
                        <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-500 shrink-0 mt-0.5"></i>
                        <span class="leading-relaxed text-sm">${task}</span>
                    </li>
                `).join('');

                let kpisHtml = (month.kpis || []).length > 0 ? `
                    <div>
                        <h5 class="text-xs font-bold text-slate-400 uppercase mb-3 flex items-center gap-2">
                            <i data-lucide="bar-chart" class="w-4 h-4"></i> مقاييس الأداء
                        </h5>
                        <div class="flex flex-wrap gap-2">${month.kpis.map(k => `
                            <div class="px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg flex items-center gap-2 text-sm">
                                <span class="font-black text-slate-900">${k.val}</span>
                                <span class="text-slate-600 font-medium">${k.label}</span>
                            </div>`).join('')}
                        </div>
                    </div>` : '';

                let delivHtml = (month.deliverables || []).length > 0 ? `
                    <div>
                        <h5 class="text-xs font-bold text-slate-400 uppercase mb-3 flex items-center gap-2">
                            <i data-lucide="file-text" class="w-4 h-4"></i> المخرجات
                        </h5>
                        <div class="flex flex-wrap gap-2">${month.deliverables.map(d => `
                            <div class="px-3 py-1.5 bg-yellow-50 text-yellow-800 border border-yellow-200 rounded-lg flex items-center gap-2 text-sm font-bold shadow-sm">
                                ${d}
                            </div>`).join('')}
                        </div>
                    </div>` : '';

                monthsHtml += `
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden group hover:border-yellow-300 transition-colors duration-300">
                    <div class="bg-slate-100/50 border-b border-slate-100 p-5 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <span class="inline-block px-3 py-1 bg-white border border-slate-200 text-slate-600 rounded-lg text-xs font-bold mb-2 shadow-sm">
                                ${month.tag}
                            </span>
                            <h4 class="text-xl font-black text-slate-800">${month.title}</h4>
                        </div>
                    </div>
                    <div class="p-6">
                        <ul class="space-y-4 mb-6">${tasksHtml}</ul>
                        <div class="pt-5 border-t border-slate-100 grid md:grid-cols-2 gap-6">
                            ${kpisHtml}
                            ${delivHtml}
                        </div>
                    </div>
                </div>`;
            });

            document.getElementById('months-container').innerHTML = monthsHtml;

            const prevDisabled = activePhase === 0;
            const nextDisabled = activePhase === phases.length - 1;

            document.getElementById('footer-nav').innerHTML = `
                <button onclick="changePhase(${Math.max(0, activePhase - 1)})" ${prevDisabled ? 'disabled' : ''} 
                    class="flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-black transition-all ${prevDisabled ? 'text-slate-300 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-50 hover:shadow-sm border border-transparent hover:border-slate-200'}">
                    <i data-lucide="chevron-right" class="w-5 h-5"></i> المرحلة السابقة
                </button>
                <div class="flex gap-1.5">${phases.map((_, i) => `<div class="h-2 rounded-full transition-all duration-500 ${i === activePhase ? 'w-8 bg-yellow-400' : 'w-2 bg-slate-200'}"></div>`).join('')}</div>
                <button onclick="changePhase(${Math.min(phases.length - 1, activePhase + 1)})" ${nextDisabled ? 'disabled' : ''} 
                    class="flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-black transition-all ${nextDisabled ? 'text-slate-300 cursor-not-allowed' : 'bg-black text-white hover:scale-105 active:scale-95 shadow-xl shadow-slate-200'}">
                    المرحلة التالية <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </button>
            `;

            lucide.createIcons();
        }

        window.changePhase = function (idx) {
            if (idx >= 0 && idx < phases.length) {
                activePhase = idx;
                renderSidebar();
                renderContent();
            }
        };

        function initApp() {
            renderGlobalKPIs();
            renderSidebar();
            renderContent();
        }
    </script>
</body>

</html>
